<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Stats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #f0f6fc;
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .controls {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .controls label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #8b949e;
            font-size: 14px;
        }
        .controls select, .controls input {
            width: 100%;
            padding: 10px 12px;
            background: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 15px;
            margin-bottom: 15px;
            outline: none;
        }
        .controls select:focus, .controls input:focus {
            border-color: #58a6ff;
        }
        .controls select option {
            background: #0d1117;
        }
        .controls button {
            width: 100%;
            padding: 10px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .controls button:hover {
            background: #2ea043;
        }
        .controls button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .status.loading {
            background: #1f2937;
            color: #60a5fa;
        }
        .status.success {
            background: #1a3a2a;
            color: #4ade80;
        }
        .status.error {
            background: #3a1a1a;
            color: #f87171;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .card h2 {
            color: #f0f6fc;
            font-size: 20px;
            margin-bottom: 12px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }
        .player {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #21262d;
            font-size: 14px;
        }
        .player:last-child {
            border-bottom: none;
        }
        .player .name {
            color: #f0f6fc;
        }
        .player .stats {
            color: #8b949e;
        }
        .no-data {
            color: #8b949e;
            text-align: center;
            padding: 40px 0;
            font-size: 16px;
        }
        .key-hint {
            color: #8b949e;
            font-size: 13px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏀 NBA Stats</h1>

    <div class="controls">
        <label for="apiKey">API Key</label>
        <input type="text" id="apiKey" placeholder="Enter balldontlie API key">

        <label for="teamSelect">Team</label>
        <select id="teamSelect">
            <option value="">Loading teams...</option>
        </select>

        <label for="seasonSelect">Season</label>
        <select id="seasonSelect">
            <option value="">Select a team first</option>
        </select>

        <button id="fetchBtn">📊 Get Stats</button>
    </div>

    <div id="status"></div>
    <div id="results"></div>
</div>

<script>
// 🔥 CHANGE THIS TO YOUR CLOUDFLARE WORKER URL 🔥
const WORKER_URL = 'https://nba.mystixal12.workers.dev';

let allTeams = [];
let currentTeamId = null;

const statusDiv = document.getElementById('status');
const resultsDiv = document.getElementById('results');
const teamSelect = document.getElementById('teamSelect');
const seasonSelect = document.getElementById('seasonSelect');
const apiKeyInput = document.getElementById('apiKey');
const fetchBtn = document.getElementById('fetchBtn');

// Load teams when API key is entered
apiKeyInput.addEventListener('change', loadTeams);
apiKeyInput.addEventListener('blur', loadTeams);

async function loadTeams() {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) return;

    setStatus('Loading teams...', 'loading');
    teamSelect.innerHTML = '<option value="">Loading...</option>';

    try {
        const response = await fetch(`${WORKER_URL}/v1/teams?per_page=100`, {
            headers: { 'Authorization': apiKey }
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        allTeams = data.data || [];

        if (!allTeams.length) {
            setStatus('No teams found. Check your API key.', 'error');
            teamSelect.innerHTML = '<option value="">No teams found</option>';
            return;
        }

        teamSelect.innerHTML = '<option value="">Select a team</option>';
        allTeams.forEach(team => {
            const option = document.createElement('option');
            option.value = team.id;
            option.textContent = `${team.full_name} (${team.abbreviation})`;
            teamSelect.appendChild(option);
        });

        setStatus(`Loaded ${allTeams.length} teams`, 'success');
        teamSelect.disabled = false;

    } catch (error) {
        setStatus(`Error: ${error.message}`, 'error');
        teamSelect.innerHTML = '<option value="">Error loading teams</option>';
    }
}

// When team is selected, load seasons
teamSelect.addEventListener('change', async function() {
    const teamId = this.value;
    if (!teamId) {
        seasonSelect.innerHTML = '<option value="">Select a team first</option>';
        return;
    }

    currentTeamId = teamId;
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) {
        setStatus('Please enter your API key', 'error');
        return;
    }

    setStatus('Loading seasons...', 'loading');
    seasonSelect.innerHTML = '<option value="">Loading seasons...</option>';

    try {
        // Get players first to find seasons
        const response = await fetch(`${WORKER_URL}/v1/players?team_ids[]=${teamId}&per_page=100`, {
            headers: { 'Authorization': apiKey }
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        const players = data.data || [];

        if (!players.length) {
            seasonSelect.innerHTML = '<option value="">No players found</option>';
            setStatus('No players found for this team', 'error');
            return;
        }

        // Get stats for all players to find available seasons
        const seasonsSet = new Set();
        for (const player of players) {
            try {
                const statsRes = await fetch(`${WORKER_URL}/v1/stats?player_ids[]=${player.id}&per_page=100`, {
                    headers: { 'Authorization': apiKey }
                });
                const statsData = await statsRes.json();
                const stats = statsData.data || [];
                stats.forEach(stat => {
                    if (stat.season) seasonsSet.add(stat.season);
                });
            } catch (e) {
                // Skip player if stats fail
            }
        }

        const seasons = Array.from(seasonsSet).sort().reverse();

        if (!seasons.length) {
            seasonSelect.innerHTML = '<option value="">No stats available</option>';
            setStatus('No stats available for this team', 'error');
            return;
        }

        seasonSelect.innerHTML = '<option value="">Select a season</option>';
        seasons.forEach(season => {
            const option = document.createElement('option');
            option.value = season;
            option.textContent = season;
            seasonSelect.appendChild(option);
        });

        setStatus(`Found ${seasons.length} seasons`, 'success');
        seasonSelect.disabled = false;

    } catch (error) {
        setStatus(`Error: ${error.message}`, 'error');
        seasonSelect.innerHTML = '<option value="">Error loading seasons</option>';
    }
});

// Fetch button click
fetchBtn.addEventListener('click', getStats);

async function getStats() {
    const apiKey = apiKeyInput.value.trim();
    const teamId = teamSelect.value;
    const season = seasonSelect.value;

    if (!apiKey) {
        setStatus('Please enter your API key', 'error');
        return;
    }
    if (!teamId) {
        setStatus('Please select a team', 'error');
        return;
    }
    if (!season) {
        setStatus('Please select a season', 'error');
        return;
    }

    const teamName = allTeams.find(t => t.id == teamId)?.full_name || 'Team';
    setStatus(`Loading ${teamName} - ${season}...`, 'loading');
    resultsDiv.innerHTML = '';
    fetchBtn.disabled = true;

    try {
        // Get players for the team
        const playersRes = await fetch(`${WORKER_URL}/v1/players?team_ids[]=${teamId}&per_page=100`, {
            headers: { 'Authorization': apiKey }
        });
        const playersData = await playersRes.json();
        const players = playersData.data || [];

        if (!players.length) {
            setStatus('No players found', 'error');
            fetchBtn.disabled = false;
            return;
        }

        // Get stats for each player for the specific season
        let playersStats = [];
        for (const player of players) {
            try {
                const statsRes = await fetch(
                    `${WORKER_URL}/v1/stats?player_ids[]=${player.id}&seasons[]=${season}&per_page=100`,
                    { headers: { 'Authorization': apiKey } }
                );
                const statsData = await statsRes.json();
                const stats = statsData.data || [];

                if (stats.length) {
                    // Calculate averages
                    let pts = 0, reb = 0, ast = 0, games = stats.length;
                    stats.forEach(stat => {
                        pts += stat.pts || 0;
                        reb += stat.reb || 0;
                        ast += stat.ast || 0;
                    });

                    playersStats.push({
                        name: `${player.first_name} ${player.last_name}`,
                        position: player.position || 'N/A',
                        pts: games ? pts / games : 0,
                        reb: games ? reb / games : 0,
                        ast: games ? ast / games : 0,
                        games: games
                    });
                }
            } catch (e) {
                // Skip player if stats fail
            }
        }

        // Sort by points per game (descending)
        playersStats.sort((a, b) => b.pts - a.pts);

        if (!playersStats.length) {
            resultsDiv.innerHTML = `<div class="no-data">No stats available for ${teamName} in ${season}</div>`;
            setStatus('No stats found', 'error');
            fetchBtn.disabled = false;
            return;
        }

        // Render results
        let html = `
            <div class="card">
                <h2>${teamName} · ${season}</h2>
                <div style="color:#8b949e;font-size:13px;margin-bottom:12px;">
                    ${playersStats.length} players · ${playersStats.reduce((sum, p) => sum + p.games, 0)} total games
                </div>
        `;

        playersStats.forEach(p => {
            html += `
                <div class="player">
                    <span class="name">${p.name} <span style="color:#8b949e;font-size:12px;">${p.position}</span></span>
                    <span class="stats">${p.games}g · ${p.pts.toFixed(1)} pts · ${p.reb.toFixed(1)} reb · ${p.ast.toFixed(1)} ast</span>
                </div>
            `;
        });

        html += '</div>';
        resultsDiv.innerHTML = html;
        setStatus(`✅ Loaded stats for ${playersStats.length} players`, 'success');

    } catch (error) {
        setStatus(`Error: ${error.message}`, 'error');
        resultsDiv.innerHTML = `<div class="no-data">Error loading stats</div>`;
    }

    fetchBtn.disabled = false;
}

function setStatus(message, type = '') {
    statusDiv.textContent = message;
    statusDiv.className = 'status ' + type;
}

// Initial state
setStatus('a125f345-8866-46b7-ab57-58988f4e41a0', '');
teamSelect.disabled = true;
seasonSelect.disabled = true;
</script>
</body>
</html>
